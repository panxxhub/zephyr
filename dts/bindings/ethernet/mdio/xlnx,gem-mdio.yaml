description: |
  Xilinx GEM MDIO bus controller.
  The MDIO controller shares the GEM register space. Place this node as
  a sibling of the GEM MAC node at the SoC level, using the same base
  address as the associated GEM controller.

compatible: "xlnx,gem-mdio"

include: mdio-controller.yaml

properties:
  reg:
    required: true
    description: |
      Base address and size of the GEM register block that contains
      the MDIO management registers (PHY_MAINTENANCE, NWCTRL, NWSR).
