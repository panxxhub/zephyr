description: |
  Xilinx AXI DMA with scatter-gather and cyclic BD support.
  Designed for streaming peripherals (FOC, custom IPs) that need
  cyclic BD rings, APP field passthrough, and dynamic SG reconfiguration.

compatible: "xlnx,axi-dma-sg"

include: dma-controller.yaml

properties:
  reg:
    required: true
    description: |
      Three regions: DMA control registers, TX buffer, RX buffer.
      Use reg-names "regs", "tx_buf", "rx_buf".

  reg-names:
    required: true

  interrupts:
    required: true
    description: |
      Two interrupts: TX (MM2S) completion, RX (S2MM) completion.

  "#dma-cells":
    const: 1

  xlnx,addrwidth:
    type: int
    required: true
    enum: [32, 64]
    description: DMA address width.

  xlnx,sg-length-width:
    type: int
    default: 14
    description: |
      Width of the Buffer Length Register in bits (Vivado parameter
      c_sg_length_width).  Determines the maximum transfer size per
      SG descriptor: max_bytes = 2^width - 1.  Valid range 8..26.
      Must match the value configured in the AXI DMA IP core.

  dma-channels:
    const: 2
    description: Fixed 2 channels (TX + RX).

dma-cells:
  - channel
